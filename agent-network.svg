<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#11142b"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="220" fill="url(#bgGrad)"/>

  <!-- Edges -->
  <g stroke="url(#edgeGrad)" stroke-width="1.4" fill="none">
    <path id="e1" d="M120,110 C260,40 320,40 420,80"/>
    <path id="e2" d="M420,80 C520,30 600,30 700,70"/>
    <path id="e3" d="M120,110 C220,170 300,170 420,150"/>
    <path id="e4" d="M420,150 C540,190 620,190 700,150"/>
    <path id="e5" d="M700,70 C780,50 840,60 880,100"/>
    <path id="e6" d="M700,150 C780,170 840,150 880,110"/>
    <path id="e7" d="M420,80 C440,110 440,120 420,150"/>
  </g>

  <!-- Traveling signal dots -->
  <circle r="3.2" fill="#c4b5fd">
    <animateMotion dur="4s" repeatCount="indefinite" path="M120,110 C260,40 320,40 420,80"/>
  </circle>
  <circle r="3.2" fill="#c4b5fd">
    <animateMotion dur="3.4s" begin="0.6s" repeatCount="indefinite" path="M420,80 C520,30 600,30 700,70"/>
  </circle>
  <circle r="3" fill="#a5b4fc">
    <animateMotion dur="4.6s" begin="1.1s" repeatCount="indefinite" path="M120,110 C220,170 300,170 420,150"/>
  </circle>
  <circle r="3" fill="#a5b4fc">
    <animateMotion dur="3.8s" begin="0.3s" repeatCount="indefinite" path="M420,150 C540,190 620,190 700,150"/>
  </circle>
  <circle r="2.8" fill="#ddd6fe">
    <animateMotion dur="3.2s" begin="0.9s" repeatCount="indefinite" path="M700,70 C780,50 840,60 880,100"/>
  </circle>
  <circle r="2.8" fill="#ddd6fe">
    <animateMotion dur="3.6s" begin="1.4s" repeatCount="indefinite" path="M700,150 C780,170 840,150 880,110"/>
  </circle>
  <circle r="2.6" fill="#e0e7ff">
    <animateMotion dur="2.6s" begin="0.2s" repeatCount="indefinite" path="M420,80 C440,110 440,120 420,150"/>
  </circle>

  <!-- Nodes with pulsing glow -->
  <g>
    <circle cx="120" cy="110" r="22" fill="url(#nodeGlow)">
      <animate attributeName="r" values="20;26;20" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="110" r="6" fill="#a78bfa"/>
  </g>
  <g>
    <circle cx="420" cy="80" r="18" fill="url(#nodeGlow)">
      <animate attributeName="r" values="16;22;16" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="80" r="5" fill="#818cf8"/>
  </g>
  <g>
    <circle cx="420" cy="150" r="18" fill="url(#nodeGlow)">
      <animate attributeName="r" values="16;22;16" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="150" r="5" fill="#818cf8"/>
  </g>
  <g>
    <circle cx="700" cy="70" r="18" fill="url(#nodeGlow)">
      <animate attributeName="r" values="16;22;16" dur="3.2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="70" r="5" fill="#818cf8"/>
  </g>
  <g>
    <circle cx="700" cy="150" r="18" fill="url(#nodeGlow)">
      <animate attributeName="r" values="16;22;16" dur="2.9s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="150" r="5" fill="#818cf8"/>
  </g>
  <g>
    <circle cx="880" cy="105" r="22" fill="url(#nodeGlow)">
      <animate attributeName="r" values="20;27;20" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="105" r="6" fill="#a78bfa"/>
  </g>

  <!-- Title -->
  <text x="500" y="35" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#e5e7eb" text-anchor="middle" letter-spacing="1">
    Designing Agentic Systems, One Node at a Time
  </text>
</svg>
